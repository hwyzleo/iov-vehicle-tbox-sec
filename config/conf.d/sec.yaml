# TBOX SEC服务配置
hsm:
  type: "soft_file"
  library_path: "/usr/lib/libhsm.so"

key_provisioning:
  mode: "soft_file"

soft_key:
  path: "/var/lib/tbox/sec/soft_keys"
  encryption_algo: "aes-256-gcm"
  encryption_key_path: "/var/lib/tbox/sec/encryption_key"

storage:
  state_file: "/var/lib/tbox/sec/provision_state.json"
  ca_cert: "/etc/tbox/ca.crt"
  cert_store: "/var/lib/tbox/sec/certs"
