# TBOX SEC服务配置
store:
  root: "./data/store"

hsm:
  type: "soft_file"
  library_path: "/usr/lib/libhsm.so"

key_provisioning:
  mode: "soft_file"

soft_key:
  path: "/data/tbox/sec/soft_keys"
  encryption_algo: "aes-256-gcm"
  encryption_key_path: "/data/tbox/sec/encryption_key"

storage:
  state_file: "/data/tbox/sec/provision_state.json"
  ca_cert: "/data/tbox/sec/ca.crt"
  cert_store: "/data/tbox/sec/certs"
