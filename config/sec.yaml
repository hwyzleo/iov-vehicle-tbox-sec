common:
  store:
    root: "."

# PROV service configuration
prov:
  storage_path: "/var/tbox/prov"
  enable_write_protection: true

hsm:
  type: "soft_file"
  library_path: ""

key_provisioning:
  mode: "soft_file"

cloud:
  endpoint: "https://oapi.example.com"
  timeout_ms: 5000
  retry_count: 3
  retry_delay_ms: 1000

storage:
  state_file: "./provision_state.json"
  ca_cert: ""
  cert_store: "./certs"

soft_key:
  path: "./"
  encryption_algo: "aes-256-gcm"
  encryption_key_path: "./"

environment:
  is_production: false

log:
  level: "INFO"
  file: "./sec_service.log"
  max_size_mb: 10
  max_files: 5
