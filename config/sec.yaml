hsm:
  type: "soft_file"
  library_path: ""

key_provisioning:
  mode: "soft_file"

cloud:
  endpoint: "https://oapi.example.com"
  timeout_ms: 5000
  retry_count: 3
  retry_delay_ms: 1000

storage:
  state_file: "/tmp/tbox/sec/provision_state.json"
  ca_cert: ""
  cert_store: "/tmp/tbox/sec/certs"

soft_key:
  path: "/tmp/tbox/sec/soft_keys"
  encryption_algo: "aes-256-gcm"
  encryption_key_path: ""

environment:
  is_production: false

log:
  level: "INFO"
  file: "/var/log/tbox/sec_service.log"
  max_size_mb: 10
  max_files: 5
