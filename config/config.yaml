# TBOX Security Service Configuration
tbox:
  # Device identification (optional, for default PROV service)
  vin: "TESTVIN1234567890"  # 保留但不用于证书
  device_sn: "TBOX-DEVICE-001"  # 替代 ecu_uid

  # HSM/Secure Element configuration
  hsm:
    type: "software"  # software, pkcs11, trustzone
    library_path: "/usr/lib/softhsm/libsofthsm2.so"
    slot_id: 0
    pin: "123456"

  # Key provisioning mode
  key_provisioning:
    mode: "hsm"  # hsm = production default (private key never leaves HSM), soft_file = test mode (private key encrypted to disk)

  # Software key storage (only used when key_provisioning.mode = "soft_file")
  soft_key:
    path: "/var/lib/tbox/sec/soft_keys"
    encryption_algo: "aes-256-gcm"
    encryption_key_path: ""  # empty uses default

  # Environment configuration
  environment:
    is_production: false  # Set to true for production builds, soft_file mode will be disabled

  # Security storage paths
  # Production: /var/lib/tbox/sec/
  storage:
    key_store: "./data/keys"
    cert_store: "./data/certs"
    state_file: "./data/provision_state.json"
    ca_cert: "/Users/hwyz_leo/Docker/step/certs/intermediate_ca.crt"  # CA certificate (DER format) for signature verification

  # Cloud communication
  cloud:
    oapi_endpoint: "https://oapi.example.com:10805"
    timeout_ms: 30000
    retry_count: 3
    retry_delay_ms: 1000

  # UDS configuration
  uds:
    security_access_level: 0x29
    session_timeout_ms: 5000

  # Certificate settings
  certificate:
    key_algorithm: "ecdsa-p256"
    validity_years: 10
    key_usage: "digitalSignature"
    extended_key_usage: "clientAuth"

  # Logging
  logging:
    level: "INFO"  # DEBUG, INFO, WARN, ERROR
    file: "/var/log/tbox/sec_service.log"
    max_size_mb: 10
    max_files: 5
